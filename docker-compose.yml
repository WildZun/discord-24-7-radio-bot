services:
  radio-bot:
    image: ghcr.io/wildzun/discord-24-7-radio-bot:master
    container_name: discord-radio-bot
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - RADIO_URL=${RADIO_URL}
      - DATABASE_PATH=/app/data/radio-bot.sqlite
    restart: unless-stopped
    init: true
    volumes:
      - radio-bot-data:/app/data

volumes:
  radio-bot-data:
